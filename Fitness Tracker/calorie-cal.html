  <body>
    <header class="container">
      <nav>

      <hgroup>
        <h1>Calorie Compass</h1>
        <p>calculate your Calorie</p>
      </hgroup>
    </header>
    <main class="container">
      <section>
        <p>Set your age, gender and activity to see your calorie</p>
        <div>
          <input type="number" placeholder="Enter your Age" id="age" />

          <select id="gender">
            <option value="female">Female</option>
            <option value="male">Male</option>
          </select>

          <select id="activityLevel">
            <option value="sedentry">Sedentry</option>
            <option value="light">Light</option>
            <option value="active">Active</option>
          </select>

          <button id="calorieBtn" type="button">Estimate Calories</button>
        </div>
      </section>
      <section>
        <p id="result"></p>
      </section>
    </main>
    <footer class="container neog-footer">
      <small>
        go from zero to hero at full stack development with
        <a href="https://neog.camp">neog.camp</a>
      </small>
    </footer>
