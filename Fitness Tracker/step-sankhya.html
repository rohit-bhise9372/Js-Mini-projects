<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="BMI calculator app" />
    <title>Step Sankhya</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src = "step-sankhya.js"></script>
  </head>
  <body>
    <header class="container">
      <nav>
        <ul>
          <li><a href="index.html">BMI Buddy</a></li>
          <li><a href="calorie-cal.html">Calorie Compass</a></li>
          <li><a href="water-watch.html">Water Watcher</a></li>
          <li><a href="step-sankhya.html">Step Sankhya</a></li>
        </ul>
      </nav>
      <hgroup>
        <h1>Step Sankhya</h1>
        <p>Know that the steps you need to walk to reach your goal weight</p>
      </hgroup>
    </header>
    <main class="container">
      <section>
        <p>Set your current weight, goal weight and time period</p>
        <div>
          <input
            type="number"
            placeholder="Enter your current weight"
            id="currentWeight"
          />

          <input
            type="number"
            placeholder="Enter goal weight"
            id="goalWeight"
          />

          <input type="number" placeholder="Enter Months" id="timePeriod" />
          <button id="calculateBtn" type="button">Calculate Steps</button>
        </div>
      </section>
      <section>
        <p id="result"></p>
      </section>
    </main>
    <footer class="container neog-footer">
      <small>
        go from zero to hero at full stack development with
        <a href="https://neog.camp">neog.camp</a>
      </small>
    </footer>
  </body>
</html>
